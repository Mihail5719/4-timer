<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таймер до Нового года — Лиссабон</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Фоновое слайд-шоу с фото Лиссабона -->
    <div class="background-slideshow" aria-hidden="true">
        <div class="background-overlay"></div>
    </div>
    <!-- Основной контент -->
    <div class="container">
        <!-- Переключатель городов (ДОБАВЛЕНО) -->
        <div class="city-selector">
            <button class="city-btn active" data-city="lisbon">
                <img src="images/flags/pt.png" alt="Португалия" class="flag-icon"> Лиссабон
            </button>
            <button class="city-btn" data-city="moscow">
                <img src="images/flags/ru.png" alt="Россия" class="flag-icon"> Москва
            </button>
            <button class="city-btn" data-city="newyork">
                <img src="images/flags/us.png" alt="США" class="flag-icon"> Нью-Йорк
            </button>
        </div>

        <!-- ИЗМЕНИТЕ h1 на h2 и добавьте id -->
        <h2 class="title" id="city-title">🎄 До Нового года в Лиссабоне осталось:</h2>

        <div class="timer" id="timer">
            <div class="timer-block">
                <span class="timer-value" id="months">0</span>
                <span class="timer-label" id="months-label">месяцев</span>
            </div>
            <div class="timer-block">
                <span class="timer-value" id="days">0</span>
                <span class="timer-label" id="days-label">дней</span>
            </div>
            <div class="timer-block">
                <span class="timer-value" id="hours">0</span>
                <span class="timer-label" id="hours-label">часов</span>
            </div>
            <div class="timer-block">
                <span class="timer-value" id="minutes">0</span>
                <span class="timer-label" id="minutes-label">минут</span>
            </div>
            <div class="timer-block">
                <span class="timer-value" id="seconds">0</span>
                <span class="timer-label" id="seconds-label">секунд</span>
            </div>
        </div>
        <p class="target-date" id="target-date"></p>
        <div class="theme-toggle">
            <span class="theme-label">☀️</span>
            <label class="switch">
                <input type="checkbox" id="theme-switch">
                <span class="slider round"></span>
            </label>
            <span class="theme-label">🌙</span>
        </div>
    </div>
    <!-- Подключаем библиотеку конфетти -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script src="app.js"></script>
</body>

</html>
